<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested If Jee main exam </title>
</head>
<body>
    <script>
        const jeeMain = 100;
        const jeeAdvanced = 150;

        if (jeeMain >= 120) {
            console.log("JEE Main clear");
            if (jeeAdvanced >= 140) {
                console.log("JEE Advanced clear");
            }
            else {
                console.log("JEE Advanced not clear");
            }
        }
        else {
            console.log("JEE Main not clear");
        }
    </script>
    
</body>
</html>
