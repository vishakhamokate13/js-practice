<!DOCTYPE html>

<body>
    <h2>JavaScript Operators</h2>
    <script>
    let a = 10;
    let b = 5;

console.log(" === Arithmetic Operators === ");
console.log("a + b =", a + b);
console.log("a - b =", a -b);
console.log("a * b =", a * b);
console.log("a / b=", a / b);
console.log("a % b =", a % b);

console.log(" === Increment / Decrement === ");
console.log("a =", a);
console.log("a++=", a++);
console.log(" a++=", a);
console.log("++a =", ++a);
console.log("a -- =", a -- );
console.log("After a -- =", a);

console.log(" === Comparison Operators === ");
console.log("a == b=", a == b);
console.log("a != b=", a != b);
console.log("a > b =", a > b);
console.log("a < b =", a < b);

console.log(" === Logical Operators === ");
console.log("(a>5&& b<10)=",(a>5 && b<10));
console.log("(a<5||b == 5)=",(a<5|| b == 5));
console.log("!(a > b)=",!(a>b));

</script>
</body>
</body>
</html>
